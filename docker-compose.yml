services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      greenhouse_net:
        ipv4_address: 10.5.0.2

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 10.5.0.2:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://10.5.0.3:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # DESATIVA O MODO KRAFT (RESOLVE O ERRO DE VARIÁVEL)
      KAFKA_ENABLE_KRAFT: "false"
    networks:
      greenhouse_net:
        ipv4_address: 10.5.0.3

  sensor:
    build: .
    restart: on-failure
    depends_on:
      - kafka
    command: python sensor.py
    networks:
      greenhouse_net:
        ipv4_address: 10.5.0.4

  model:
    build: .
    restart: on-failure
    depends_on:
      - kafka
    command: python model.py
    volumes:
      - .:/app
    networks:
      greenhouse_net:
        ipv4_address: 10.5.0.5

  web:
    image: nginx:latest
    ports:
      - "8081:80"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./previsao.json:/usr/share/nginx/html/previsao.json:ro
    networks:
      greenhouse_net:
        ipv4_address: 10.5.0.6

networks:
  greenhouse_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.5.0.0/16
